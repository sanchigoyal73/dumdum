<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovaCorp Employee Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <a href="#" class="brand">NovaCorp</a>
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <h1>Welcome to the NovaCorp Employee Portal</h1>
            <p>Your one-stop hub for company resources and tools.</p>
        </div>
    </header>

    <main class="container">
        <section class="quick-links">
            <h2>Quick Links</h2>
            <div class="button-grid">
                <button id="view-directory-btn">View Staff Directory</button>
                <button id="admin-panel-btn">Admin Panel</button>
                <button id="system-config-btn">System Config</button>
                <button id="internal-tools-btn">Internal Tools</button>
                <button id="search-employee-btn">Search Employee</button>
            </div>
        </section>

        <section class="response-section">
            <h2>Data Viewer</h2>
            <pre id="response-display"></pre>
        </section>
    </main>

    <footer class="footer">
        <p>© 2026 NovaCorp. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
